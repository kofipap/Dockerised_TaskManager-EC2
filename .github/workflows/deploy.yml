name: Docker Build and Deploy to EC2

on:
  push:
    branches:
      - master

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/task-manager-app

jobs:

  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t $IMAGE_NAME:latest .

      - name: Push Docker Image
        run: docker push $IMAGE_NAME:latest


  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: self-hosted

    steps:
      - name: Pull Latest Image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/task-manager-app:latest

      - name: Stop Existing Container
        run: |
          docker stop task-manager-container || true
          docker rm task-manager-container || true

      - name: Run New Container
        run: |
          docker run -d \
            --name task-manager-container \
            -p 3000:3000 \
            --restart unless-stopped \
            ${{ secrets.DOCKER_USERNAME }}/task-manager-app:latest

      - name: Verify Running Container
        run: docker ps